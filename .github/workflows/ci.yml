name: Go Enforcer CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Formatter (gofmt)
      run: |
        if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
          echo "Archivos sin formatear detectados:"
          gofmt -l .
          exit 1
        fi

    - name: Linter (golangci-lint)
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest

    - name: Unit & Integration Tests
      run: go test -v -short ./...

  e2e-tests:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install Playwright Dependencies
      run: |
        go mod tidy
        go run github.com/playwright-community/playwright-go/cmd/playwright@latest install --with-deps

    - name: Run App and Test
      run: |
        # Iniciar el servidor en segundo plano
        go run main.go & 
        # Esperar a que el servidor responda
        sleep 5
        # Ejecutar solo los tests E2E
        go test -v -run TestEndToEndMagicTrick

  deploy:
      needs: e2e-tests
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main'
      steps:
        - name: Deploy to Render
          run: |
            curl -f "${{ secrets.RENDER_DEPLOY_HOOK }}"      