repos:
-   repo: [https://github.com/pre-commit/pre-commit-hooks](https://github.com/pre-commit/pre-commit-hooks)
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml

-   repo: [https://github.com/golangci/golangci-lint](https://github.com/golangci/golangci-lint)
    rev: v1.54.2
    hooks:
    -   id: golangci-lint

-   repo: local
    hooks:
    -   id: go-test
        name: go-test
        entry: go test ./...
        language: system
        pass_filenames: false